#
# The scripts here import each other as top-level modules. Without
# explicit package bases, mypy can also derive a dotted module name for
# these files by walking up toward the crosswords repo root (whose
# clue_gen package is installed), yielding "Source file found twice
# under different module names" errors. Explicit package bases pin
# module names to this directory.
[mypy]
explicit_package_bases = True
